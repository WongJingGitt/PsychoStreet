# companies (公司池)
#     - name： 公司名称,唯一标识符。LLM 写新闻、玩家买股票、MCP 查表时都用这个。名字自带梗（如“恒大不产”），能立刻让玩家联想到现实原型，增加代入感。
#     - industry_tag：行业标签，宏观事件挂钩。当 MacroEvents 触发“科技股暴跌”或“地产寒冬”时，MCP 会根据这个标签筛选出受影响的股票，批量修改股价。
#     - description：公司简介，纯叙事素材。这段话是给 LLM 看的，用来在新闻、个股详情页里渲染公司形象。注意： 它只描述“业务模式”和“调性”，绝不包含“财务好坏”或“股价高低”。
#         (例子：恒大的描述是“擅长借钱盖楼”，至于它借的钱还不还得上？那是 MCP 随机生成的 hidden_fundamentals 决定的。)

# celebrities (名人池)
#     - name：名人姓名，NPC 交互对象。玩家可以尝试约见、贿赂或在这个人的推特下留言。
#     - role：身份/职位，LLM 评估依据。当玩家想约见“马斯氪”时，LLM 看到他是“特斯跨CEO”，会判定这需要极高的 fame（名声值），否则直接驳回为 impossible。
#     - influence_power：影响力权重 (0-100)，核弹参数。在 V2.0 市场引擎的【Phase 1: 注意力溢出】阶段，这个数值决定了该名人发一条推特能对股价造成多大的波澜。(99分的马斯氪发帖能让股价跳涨 20%，60分的贾跃停只能影响 1%。)
#     - description：人物画像，性格与行为逻辑。LLM 用来扮演这个 NPC 的说话语气。比如看到“喜欢发狗头表情”，LLM 在生成马斯氪的推文时就会模仿这种风格。

# institutions (机构池)
#     - name：机构名称，市场博弈主体。这是在后台运行的那些 AI 基金的名字。
#     - type：策略类型，AI 行为逻辑核心。
#           * value：低吸高抛，稳健。
#           * hedge_short：做空秃鹫，专盯坏账，会发做空报告。
#           * quant：量化狗，追涨杀跌，放大波动。
#     - capital：初始资金规模，市场冲击力上限。决定了这个机构能买多少货。资金越厚，对滑点的影响越大（遵循非线性公式）。
#     - description：机构风格描述，新闻素材。当机构爆仓或举牌时，LLM 会引用这段描述来写新闻。(例子：如果“浑水摸鱼”做空了，新闻会写“正如描述所言，这群鲨鱼闻到了血腥味...”。)



